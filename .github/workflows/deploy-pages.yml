name: Déployer RevPilot sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v6

      - name: Installer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Installer les dépendances
        working-directory: app
        run: npm ci

      - name: Tester l'application
        working-directory: app
        run: npm test

      - name: Construire le site
        working-directory: app
        run: npm run build

      - name: Préparer le site pour GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publier le site
        id: deployment
        uses: actions/deploy-pages@v4
